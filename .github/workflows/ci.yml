name: CI

on:
  push

jobs:
  ci:
    runs-on: ubuntu-latest

    # contents: write is needed by the badge-publish step to force-push the
    # ci-badges branch (ADR 084); everything else only reads.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js with pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: pnpm install -r --frozen-lockfile

      - name: Security audit (fails on new high or critical production advisories)
        run: pnpm audit-ci

      - name: Run linter
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Build tests
        run: pnpm build:tests

      - name: Run tests
        run: pnpm test

      - name: Coverage report
        run: pnpm coverage:report
        continue-on-error: true

      # Publish the regenerated badge + report to the dedicated ci-badges
      # branch (single orphan commit, force-pushed) so the README badge tracks
      # every main run without ever putting an automated commit on main
      # (ADR 084). GITHUB_TOKEN pushes cannot retrigger workflows, and the
      # [skip ci] marker documents that no CI is expected on that branch.
      - name: Publish coverage badge (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ ! -f .github/badges/coverage.svg ] || [ ! -f COVERAGE.md ]; then
            echo "coverage artifacts missing (coverage report failed?); skipping badge publish"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan ci-badges
          git rm -r -q --cached .
          git add -f .github/badges/coverage.svg COVERAGE.md
          git commit -m "coverage badge + report for ${GITHUB_SHA} [skip ci]"
          git push -f origin ci-badges